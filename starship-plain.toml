"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100
command_timeout = 1000

format = """
[](color_orange)\
$os\
$username\
${custom.host_runai}\
${custom.host_docker}\
${custom.host_euler}\
${custom.host_vpn}\
${custom.host_generic}\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "Win"
Ubuntu = "Ubu"
SUSE = "SUSE"
openSUSE = "oSUSE"
Raspbian = "Rasp"
Mint = "Mint"
Macos = "Mac"
Manjaro = "Mjro"
Linux = "Lnx"
Gentoo = "Gnt"
Fedora = "Fed"
Alpine = "Alp"
Amazon = "Amz"
Android = "And"
AOSC = "AOSC"
Arch = "Arch"
Artix = "Artx"
EndeavourOS = "End"
CentOS = "Cent"
Debian = "Deb"
Redhat = "RH"
RedHatEnterprise = "RHEL"
Pop = "Pop"

[custom.host_runai]
style = "bg:color_orange fg:color_fg0 bold"
when = ''' [ -d /myhome ] '''
format = '[@runai($style) ]($style)'

[custom.host_docker]
style = "bg:color_orange fg:color_fg0 bold"
when = ''' [ ! -d /myhome ] && [ -f /.dockerenv ] '''
format = '[@docker($style) ]($style)'

[custom.host_euler]
style = "bg:color_orange fg:color_fg0 bold"
when = ''' case "$(hostname -s)" in eu-*) exit 0 ;; *) exit 1 ;; esac '''
format = '[@euler($style) ]($style)'

[custom.host_vpn_ethz]
style = "bg:color_orange fg:color_fg0 bold"
when = ''' case "$(hostname -s)" in *staff-net-vpn*) exit 0 ;; *) exit 1 ;; esac '''
format = '[@vpn-ETHZ($style) ]($style)'

[custom.host_generic]
style = "bg:color_orange fg:color_fg0 bold"
when = ''' [ ! -d /myhome ] && [ ! -f /.dockerenv ] && case "$(hostname -s)" in eu-*|*staff-net-vpn*) exit 1 ;; *) exit 0 ;; esac '''
command = 'hostname -s'
format = '[@$output($style) ]($style)'

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "DOCS"
"Downloads" = "DOWN"
"Music" = "MUSIC"
"Pictures" = "PICS"
"Developer" = "DEV"

[git_branch]
symbol = "git:"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = "node:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "C:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "C++:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "rust:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "go:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "php:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "java:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "kt:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "hs:"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "py:"
style = "bg:color_blue"
format = '[[ $symbol( $version)( \[$virtualenv\]) ](fg:color_fg0 bg:color_blue)]($style)'
detect_files = [".python-version", "pyproject.toml", ".venv"]

[docker_context]
symbol = "docker:"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[$](bold fg:color_green)'
error_symbol = '[!](bold fg:color_red)'
vimcmd_symbol = '[N](bold fg:color_green)'
vimcmd_replace_one_symbol = '[r](bold fg:color_purple)'
vimcmd_replace_symbol = '[R](bold fg:color_purple)'
vimcmd_visual_symbol = '[V](bold fg:color_yellow)'
